{% extends "base.html" %}
{% block title %}Resume Builder{% endblock %}
{% block content %}

<div class="container" style="padding: 30px 24px;">
  <div class="page-header">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;">
      <div>
        <h1 class="page-title">Resume Builder</h1>
        <p class="page-sub">Create a polished, AI-optimized resume in minutes</p>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
        
        <!-- NEW: Import Resume Button -->
        <button class="btn btn-ghost" onclick="document.getElementById('pdf-upload').click()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Import Resume
        </button>
        <input type="file" id="pdf-upload" hidden accept=".pdf" onchange="handleFileUpload(this)">

        <div class="template-switcher">
          <button class="template-btn active" onclick="setTemplate('classic', this)">Classic</button>
          <button class="template-btn" onclick="setTemplate('modern', this)">Modern</button>
        </div>
        <button class="btn btn-outline" onclick="optimizeResume()">✨ AI Optimize</button>
        <button class="btn btn-primary" onclick="downloadPDF()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Download PDF
        </button>
      </div>
    </div>
  </div>

  <div class="builder-layout">
    <!-- Editor -->
    <div class="builder-editor">
      <div class="card" style="padding:24px;">
        <h3 style="font-family:var(--font-display);font-size:1.05rem;margin-bottom:20px;">Edit Resume</h3>

        <div class="form-group">
          <label>Full Name</label>
          <input type="text" class="form-control" id="gen-name" oninput="updatePreview()" value="John Doe">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="text" class="form-control" id="gen-email" oninput="updatePreview()" value="john@example.com">
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="text" class="form-control" id="gen-mobile" oninput="updatePreview()" value="+1 555-0199">
        </div>
        <div class="form-group">
          <label>LinkedIn / Portfolio URL</label>
          <input type="text" class="form-control" id="gen-link" oninput="updatePreview()" placeholder="linkedin.com/in/johndoe">
        </div>
        <div class="form-group">
          <label>Professional Summary</label>
          <textarea class="form-control" id="gen-summary" rows="5" oninput="updatePreview()">Experienced software engineer with 5+ years building scalable web applications. Passionate about clean architecture and developer experience.</textarea>
        </div>
        <div class="form-group">
          <label>Skills <span style="color:var(--text-muted);font-size:0.75rem;text-transform:none;letter-spacing:0;">(comma separated)</span></label>
          <textarea class="form-control" id="gen-skills" rows="3" oninput="updatePreview()">JavaScript, React, Node.js, Python, PostgreSQL, AWS</textarea>
        </div>
        <div class="form-group">
          <label>Work Experience</label>
          <textarea class="form-control" id="gen-exp" rows="6" oninput="updatePreview()">Senior Engineer — Tech Corp (2021–Present)
Led development of microservices platform serving 2M+ users. Reduced API latency by 40%.

Engineer — StartupCo (2019–2021)
Built React dashboard from scratch. Shipped 12 features per quarter.</textarea>
        </div>
        <div class="form-group">
          <label>Education</label>
          <textarea class="form-control" id="gen-edu" rows="3" oninput="updatePreview()">B.S. Computer Science — State University, 2019
GPA: 3.8/4.0</textarea>
        </div>
      </div>
    </div>

    <!-- Preview -->
    <div>
      <div style="position:sticky;top:90px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
          <span style="font-size:0.8rem;color:var(--text-muted);font-family:var(--font-mono);">Live Preview</span>
          <span id="template-label" style="font-size:0.75rem;color:var(--primary);font-weight:600;text-transform:uppercase;letter-spacing:0.06em;">Classic</span>
        </div>
        <div id="resume-preview" class="resume-paper"></div>
      </div>
    </div>
  </div>
</div>

{% endblock %}

{% block scripts %}
<script>
let currentTemplate = 'classic';

document.addEventListener('DOMContentLoaded', updatePreview);

function setTemplate(name, btn) {
  currentTemplate = name;
  document.querySelectorAll('.template-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('template-label').textContent = name.charAt(0).toUpperCase() + name.slice(1);
  updatePreview();
}

function updatePreview() {
  const name = document.getElementById('gen-name').value || '';
  const email = document.getElementById('gen-email').value || '';
  const mobile = document.getElementById('gen-mobile').value || '';
  const link = document.getElementById('gen-link').value || '';
  const summary = document.getElementById('gen-summary').value || '';
  const skills = document.getElementById('gen-skills').value || '';
  const exp = document.getElementById('gen-exp').value || '';
  const edu = document.getElementById('gen-edu').value || '';
  const preview = document.getElementById('resume-preview');

  const skillTags = skills.split(',').map(s => s.trim()).filter(Boolean)
    .map(s => `<span style="display:inline-block;padding:2px 10px;border-radius:3px;font-size:0.8rem;margin:2px;background:#e8e8f0;color:#333;">${s}</span>`).join('');

  const expFormatted = exp.split('\n').map(line => {
    if (line.trim() === '') return '<br>';
    if (/^[A-Z]/.test(line) && (line.includes('—') || line.includes('-'))) {
      return `<p style="margin:0;font-weight:700;font-size:0.9rem;">${line}</p>`;
    }
    return `<p style="margin:2px 0;font-size:0.85rem;color:#555;">${line}</p>`;
  }).join('');

  const contact = [email, mobile, link].filter(Boolean).join(' · ');

  if (currentTemplate === 'modern') {
    preview.style.fontFamily = "'DM Sans', Arial, sans-serif";
    preview.innerHTML = `
      <div style="border-bottom:3px solid #6c63ff;padding-bottom:16px;margin-bottom:20px;">
        <h1 style="color:#1a1a2e;font-size:1.8rem;margin:0;font-weight:800;">${name}</h1>
        <p style="color:#6c63ff;margin:6px 0 0;font-size:0.875rem;">${contact}</p>
      </div>
      <div style="display:grid;grid-template-columns:1fr 200px;gap:24px;">
        <div>
          <h3 style="color:#6c63ff;font-size:0.75rem;text-transform:uppercase;letter-spacing:0.1em;margin:0 0 8px;font-weight:700;">Summary</h3>
          <p style="font-size:0.87rem;color:#444;line-height:1.6;margin:0 0 20px;">${summary}</p>
          <h3 style="color:#6c63ff;font-size:0.75rem;text-transform:uppercase;letter-spacing:0.1em;margin:0 0 10px;font-weight:700;">Experience</h3>
          ${expFormatted}
          <h3 style="color:#6c63ff;font-size:0.75rem;text-transform:uppercase;letter-spacing:0.1em;margin:20px 0 10px;font-weight:700;">Education</h3>
          <div style="font-size:0.87rem;color:#444;">${edu.replace(/\n/g,'<br>')}</div>
        </div>
        <div>
          <h3 style="color:#6c63ff;font-size:0.75rem;text-transform:uppercase;letter-spacing:0.1em;margin:0 0 10px;font-weight:700;">Skills</h3>
          <div>${skillTags}</div>
        </div>
      </div>
    `;
  } else {
    preview.style.fontFamily = "'Times New Roman', Georgia, serif";
    preview.innerHTML = `
      <div style="text-align:center;border-bottom:2px solid #1a1a2e;padding-bottom:14px;margin-bottom:20px;">
        <h1 style="text-transform:uppercase;letter-spacing:0.1em;font-size:1.6rem;margin:0;color:#1a1a2e;">${name}</h1>
        <p style="color:#555;margin:6px 0 0;font-size:0.85rem;">${contact}</p>
      </div>
      <h3 style="border-bottom:1px solid #1a1a2e;text-transform:uppercase;font-size:0.75rem;letter-spacing:0.12em;margin:0 0 8px;padding-bottom:4px;">Objective</h3>
      <p style="font-size:0.87rem;color:#333;line-height:1.6;margin:0 0 18px;">${summary}</p>
      <h3 style="border-bottom:1px solid #1a1a2e;text-transform:uppercase;font-size:0.75rem;letter-spacing:0.12em;margin:0 0 10px;padding-bottom:4px;">Work Experience</h3>
      ${expFormatted}
      <h3 style="border-bottom:1px solid #1a1a2e;text-transform:uppercase;font-size:0.75rem;letter-spacing:0.12em;margin:18px 0 8px;padding-bottom:4px;">Education</h3>
      <div style="font-size:0.87rem;color:#333;">${edu.replace(/\n/g,'<br>')}</div>
      <h3 style="border-bottom:1px solid #1a1a2e;text-transform:uppercase;font-size:0.75rem;letter-spacing:0.12em;margin:18px 0 10px;padding-bottom:4px;">Skills</h3>
      <p style="font-size:0.87rem;color:#333;">${skills}</p>
    `;
  }
}

// ── NEW: FILE UPLOAD & PARSING LOGIC ─────────────────────────────────────
async function handleFileUpload(input) {
  const file = input.files[0];
  if (!file) return;

  if (file.type !== 'application/pdf') {
    showToast('Please upload a PDF file.', 'error');
    input.value = ''; // Reset
    return;
  }

  showToast('Parsing resume...', 'info');

  const formData = new FormData();
  formData.append('file', file);

  try {
    const response = await fetch('/api/parse_for_generator', {
      method: 'POST',
      body: formData
    });

    const data = await response.json();

    if (data.error) {
      showToast(data.error, 'error');
    } else {
      populateForm(data);
      showToast('Resume imported successfully!', 'success');
    }
  } catch (err) {
    console.error(err);
    showToast('Failed to parse resume.', 'error');
  } finally {
    input.value = ''; // Reset input so same file can be selected again
  }
}

function populateForm(data) {
  if (data.name) document.getElementById('gen-name').value = data.name;
  if (data.email) document.getElementById('gen-email').value = data.email;
  if (data.mobile) document.getElementById('gen-mobile').value = data.mobile;
  
  // Note: 'link' might not be parsed by backend, so we leave it if empty
  if (data.link) document.getElementById('gen-link').value = data.link;

  if (data.summary) document.getElementById('gen-summary').value = data.summary;
  
  // Skills are returned as newline-separated string from API in some versions, 
  // or array. Handle both safely. The input prefers comma-separated.
  if (data.skills) {
    // If it's an array, join with comma. If string, just set it.
    const skillStr = Array.isArray(data.skills) ? data.skills.join(', ') : data.skills;
    document.getElementById('gen-skills').value = skillStr;
  }

  if (data.experience) document.getElementById('gen-exp').value = data.experience;
  if (data.education) document.getElementById('gen-edu').value = data.education;

  // Trigger preview update to reflect new data
  updatePreview();
}
// ─────────────────────────────────────────────────────────────────────────

async function optimizeResume() {
  const btn = event.target;
  const original = btn.innerText;
  btn.innerText = '⏳ Optimizing…';
  btn.disabled = true;

  const text = document.getElementById('gen-summary').value;
  try {
    const res = await fetch('/api/llm/optimize', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });
    const data = await res.json();
    document.getElementById('gen-summary').value = data.optimized || text;
    updatePreview();
    showToast('Summary optimized by AI!', 'success');
  } catch (e) {
    showToast('Optimization failed', 'error');
  } finally {
    btn.innerText = original;
    btn.disabled = false;
  }
}

async function downloadPDF() {
  showToast('Generating PDF…');
  const data = {
    name: document.getElementById('gen-name').value,
    email: document.getElementById('gen-email').value,
    mobile: document.getElementById('gen-mobile').value,
    summary: document.getElementById('gen-summary').value,
    skills: document.getElementById('gen-skills').value,
    experience: document.getElementById('gen-exp').value,
    education: document.getElementById('gen-edu').value,
    style: currentTemplate
  };

  try {
    const res = await fetch('/api/download_updated_resume', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    if (res.ok) {
      const blob = await res.blob();
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'Resume.pdf';
      document.body.appendChild(a); a.click(); a.remove();
      showToast('PDF downloaded!', 'success');
    } else {
      showToast('PDF generation failed', 'error');
    }
  } catch (e) {
    showToast('Download failed', 'error');
  }
}
</script>
{% endblock %}
